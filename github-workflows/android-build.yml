name: Build Android APK

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Тип сборки"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
          - release-signed

permissions:
  contents: write

jobs:
  build:
    name: Build APK / AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine build mode
        id: mode
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "build_type=release-signed" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "Tag detected: ${GITHUB_REF_NAME} -> release-signed + GitHub Release"
          elif [[ -n "${{ github.event.inputs.build_type }}" ]]; then
            echo "build_type=${{ github.event.inputs.build_type }}" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Manual mode: ${{ github.event.inputs.build_type }}"
          else
            echo "build_type=debug" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Auto mode: debug"
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 platform-tools"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install JS dependencies
        run: bun install

      - name: Build web (Vite)
        run: bun run build

      - name: Sync Capacitor (Android)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        if: ${{ steps.mode.outputs.build_type == 'debug' }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        if: ${{ steps.mode.outputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: nova-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Build Release AAB (unsigned)
        if: ${{ steps.mode.outputs.build_type == 'release' }}
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload Release AAB (unsigned)
        if: ${{ steps.mode.outputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: nova-release-aab-unsigned
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

      - name: Decode keystore
        if: ${{ steps.mode.outputs.build_type == 'release-signed' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Не найден secret ANDROID_KEYSTORE_BASE64. Добавь keystore в Settings -> Secrets -> Actions"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          echo "Keystore decoded, size: $(stat -c%s android/app/release.keystore) bytes"

      - name: Build Signed Release APK + AAB
        if: ${{ steps.mode.outputs.build_type == 'release-signed' }}
        working-directory: android
        env:
          NOVA_KEYSTORE_PATH: release.keystore
          NOVA_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          NOVA_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          NOVA_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace

      - name: Rename release artifacts with version
        if: ${{ steps.mode.outputs.build_type == 'release-signed' }}
        run: |
          VERSION="${{ steps.mode.outputs.version || 'manual' }}"
          mkdir -p release-output
          cp android/app/build/outputs/apk/release/app-release.apk "release-output/nova-${VERSION}.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "release-output/nova-${VERSION}.aab"
          ls -la release-output/

      - name: Upload Signed Release APK
        if: ${{ steps.mode.outputs.build_type == 'release-signed' }}
        uses: actions/upload-artifact@v4
        with:
          name: nova-release-apk-signed
          path: release-output/nova-*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Upload Signed Release AAB
        if: ${{ steps.mode.outputs.build_type == 'release-signed' }}
        uses: actions/upload-artifact@v4
        with:
          name: nova-release-aab-signed
          path: release-output/nova-*.aab
          if-no-files-found: error
          retention-days: 90

      - name: Cleanup keystore
        if: ${{ always() && steps.mode.outputs.build_type == 'release-signed' }}
        run: rm -f android/app/release.keystore

      - name: Generate changelog from commits
        if: ${{ steps.mode.outputs.is_release == 'true' }}
        id: changelog
        run: |
          VERSION="${{ steps.mode.outputs.version }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${VERSION}$" | head -n 1 || echo "")
          {
            echo "## Nova ${VERSION}"
            echo ""
            echo "### Что нового"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "Изменения с ${PREV_TAG}:"
              echo ""
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges
            else
              echo "Первый релиз приложения."
              echo ""
              git log --pretty=format:"- %s (%h)" --no-merges -20
            fi
            echo ""
            echo ""
            echo "### Установка"
            echo ""
            echo "- APK - скачай nova-${VERSION}.apk, открой на Android-телефоне"
            echo "- AAB - для загрузки в RuStore / Google Play Console"
          } > CHANGELOG_RELEASE.md
          cat CHANGELOG_RELEASE.md

      - name: Create GitHub Release
        if: ${{ steps.mode.outputs.is_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.mode.outputs.version }}
          name: Nova ${{ steps.mode.outputs.version }}
          body_path: CHANGELOG_RELEASE.md
          draft: false
          prerelease: ${{ contains(steps.mode.outputs.version, '-') }}
          files: |
            release-output/nova-*.apk
            release-output/nova-*.aab
