name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Тип сборки"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
          - release-signed

permissions:
  contents: read

jobs:
  build:
    name: Build APK / AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 platform-tools"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install JS dependencies
        run: bun install

      - name: Build web (Vite)
        run: bun run build

      # Capacitor sync создаст: gradlew, gradle-wrapper.jar, актуальные capacitor.settings.gradle,
      # capacitor.plugins.json, capacitor.build.gradle и скопирует dist/ → android/app/src/main/assets/public/
      - name: Sync Capacitor (Android)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Debug сборка (без подписи) ─────────────────────────────────────
      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type != 'release' && github.event.inputs.build_type != 'release-signed' }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        if: ${{ github.event.inputs.build_type != 'release' && github.event.inputs.build_type != 'release-signed' }}
        uses: actions/upload-artifact@v4
        with:
          name: nova-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      # ── Release сборка БЕЗ подписи (для ручной подписи позже) ──────────
      - name: Build Release AAB (unsigned)
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload Release AAB (unsigned)
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: nova-release-aab-unsigned
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

      # ── Release сборка С автоматической подписью ───────────────────────
      - name: Decode keystore
        if: ${{ github.event.inputs.build_type == 'release-signed' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Не найден secret ANDROID_KEYSTORE_BASE64. Добавь keystore в Settings → Secrets → Actions"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          echo "Keystore decoded, size: $(stat -c%s android/app/release.keystore) bytes"

      - name: Build Signed Release APK + AAB
        if: ${{ github.event.inputs.build_type == 'release-signed' }}
        working-directory: android
        env:
          NOVA_KEYSTORE_PATH: release.keystore
          NOVA_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          NOVA_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          NOVA_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace

      - name: Upload Signed Release APK
        if: ${{ github.event.inputs.build_type == 'release-signed' }}
        uses: actions/upload-artifact@v4
        with:
          name: nova-release-apk-signed
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 90

      - name: Upload Signed Release AAB
        if: ${{ github.event.inputs.build_type == 'release-signed' }}
        uses: actions/upload-artifact@v4
        with:
          name: nova-release-aab-signed
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 90

      - name: Cleanup keystore
        if: ${{ always() && github.event.inputs.build_type == 'release-signed' }}
        run: rm -f android/app/release.keystore

      - name: Build summary
        if: always()
        run: |
          echo "### Сборка Nova" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            SIZE=$(du -h android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "✅ Debug APK готов — $SIZE" >> $GITHUB_STEP_SUMMARY
            echo "Скачать: Actions → этот run → Artifacts → **nova-debug-apk**" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            SIZE=$(du -h android/app/build/outputs/apk/release/app-release.apk | cut -f1)
            echo "✅ Подписанный Release APK — $SIZE" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "android/app/build/outputs/bundle/release/app-release.aab" ]; then
            SIZE=$(du -h android/app/build/outputs/bundle/release/app-release.aab | cut -f1)
            echo "✅ Release AAB — $SIZE" >> $GITHUB_STEP_SUMMARY
          fi
