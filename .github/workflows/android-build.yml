name: Build Android APK

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Signed AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 platform-tools"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install JS dependencies
        run: bun install

      - name: Build web (Vite)
        run: bun run build

      - name: Sync Capacitor (Android)
        run: npx cap sync android

      - name: Ensure Gradle Wrapper exists
        working-directory: android
        run: |
          echo "Генерирую Gradle Wrapper 8.2.1"
          gradle wrapper --gradle-version 8.2.1 --distribution-type all --no-daemon
          chmod +x gradlew
          ./gradlew --version

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Не найден secret ANDROID_KEYSTORE_BASE64"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          echo "Keystore decoded: $(stat -c%s android/app/release.keystore) bytes"

      - name: Build Signed Release APK + AAB
        working-directory: android
        env:
          NOVA_KEYSTORE_PATH: release.keystore
          NOVA_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          NOVA_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          NOVA_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace

      - name: Rename artifacts with version
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          mkdir -p release-output
          cp android/app/build/outputs/apk/release/app-release.apk "release-output/nova-${VERSION}.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "release-output/nova-${VERSION}.aab"
          ls -la release-output/

      - name: Cleanup keystore
        if: always()
        run: rm -f android/app/release.keystore

      - name: Create GitHub Release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nova ${{ github.ref_name }}
          draft: false
          files: |
            release-output/nova-*.apk
            release-output/nova-*.aab
